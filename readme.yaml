title: "awesome-greek-tech-jobs"
tagline: "The open-source pulse on who hires in technology across Greece"
description: >
  A vibrant, community-maintained map of employers hiring for technology
  roles in Greece — sectors, work policies, career portals, and weekly
  Workable hiring snapshots so you can explore with confidence.

live_url: "https://leftkats.github.io/awesome-greek-tech-jobs/"
repo: "leftkats/awesome-greek-tech-jobs"

branding:
  logo:
    alt: "AWGJ"
    src_light: "assets/vectorized.svg"
    src_dark: "assets/vectorized.svg"
    width: 180
  intro_line_2: "Search, filter, and explore — weekly Workable counts included."

badges:
  stats:
    style: "for-the-badge"
    companies_color: "2563eb"
    open_roles_color: "f59e0b"
    remote_color: "16a34a"
    hybrid_color: "ca8a04"
  meta:
    show_ci: false
    ci_workflow: "pr-validation.yaml"
    show_license: true
    show_last_commit: true

disclaimer: >
  This project is for **community and educational purposes only**.
  All data is aggregated from publicly available sources (company
  websites, LinkedIn, Workable's public API).  Job counts shown are
  **cached snapshots** generated weekly and **do not represent
  a real-time official database**.


  **Please note:**

  * **Non-Affiliation:** This project is independent and is not affiliated
    with, sponsored by, or endorsed by any of the companies listed.
    All company names and links are the property of their respective owners.

  * **Public Data Only:** Job counts are retrieved from Workable's
    unauthenticated, publicly accessible API endpoints.  No private
    data, scraping behind login walls, or terms-of-service circumvention
    is involved.

  * **Accuracy:** Information is gathered from public sources.  Company
    policies and openings change frequently — always verify on the
    official company website.

  * **Contributions:** Spotted an error?  PRs and issues are welcome.

  * **Liability:** As per the [MIT License](LICENSE), this information
    is provided "as is" without warranty of any kind.

development: |
  Use [uv](https://github.com/astral-sh/uv) for Python and [just](https://github.com/casey/just) for short commands:

  - `just setup` or `just sync` — install dependencies (`just sync --frozen` in CI)
  - `just generate` — regenerate `readme.md`, `engineering-hubs.md`, and `index.html`
  - `just all` — fetch Workable counts, then regenerate everything

  See [contributing.md](contributing.md) for the full workflow. You can still run `uv run python -m scripts.…` directly.

footer:
  description: "Built with ❤️ by the community. PRs welcome!"
  notes:
    - title: "Remote vs. Hybrid"
      content: "Many Athens-based companies are moving to 1-2 days in office."
    - title: "Salary Insight"
      content: >
        Remote roles for international companies (via B2B) usually pay
        higher than local Greek contracts.  Weigh the trade-offs when
        the latter includes private health coverage.
    - title: "Interview Prep"
      content: "Focus on System Design for Senior roles and LeetCode (Medium) for mid-level."
    - title: "Job Counts"
      content: >
        Workable counts are fetched weekly via CI from the public API and
        may be inaccurate due to timing, geography filters, or API behavior.
