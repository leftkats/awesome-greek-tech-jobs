name: PR Data Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'data/**'

permissions:
  pull-requests: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python and dependencies
        run: uv sync --frozen

      - name: Fetch site sources from branch live
        run: |
          set -euo pipefail
          git fetch origin live
          mkdir -p templates scripts assets/css assets/js
          git checkout origin/live -- templates scripts/generate_index.py assets/css assets/js assets/og-image.png

      - name: Run Scripts
        id: run_scripts
        continue-on-error: true
        run: |
          uv run python -m scripts.generate_readme
          uv run python -m scripts.generate_index
